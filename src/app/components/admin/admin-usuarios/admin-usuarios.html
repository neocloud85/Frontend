<h1>Gestión de Usuarios</h1>

<input 
  type="text" 
  placeholder="Buscar por nombre o correo..."
  [(ngModel)]="searchTerm"
  (input)="buscar()"
>

@if (!loading()) {
  <table class="tabla-usuarios">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Correo</th>
        <th>Tipo</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      @for (u of usuarios(); track u.id) {
        <tr>
          <td>{{ u.nombre }}</td>
          <td>{{ u.correo }}</td>
          <td>{{ u.tipo }}</td>
          <td>{{ u.activo ? 'Sí' : 'No' }}</td>

          <td>
            <button routerLink="/admin/usuarios/editar/{{ u.id }}">Editar</button>

            @if (u.tipo !== 'admin') {
              <button (click)="hacerAdmin(u.id)">Hacer Admin</button>
            }

            <button (click)="borrar(u.id)">Borrar</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
}

@if (totalPages() > 1) {
  <div class="paginacion">
    <button 
      (click)="page.set(page()-1); cargarUsuarios()" 
      [disabled]="page() === 1">
      Anterior
    </button>

    <span>Página {{ page() }} de {{ totalPages() }}</span>

    <button 
      (click)="page.set(page()+1); cargarUsuarios()" 
      [disabled]="page() === totalPages()">
      Siguiente
    </button>
  </div>
}
